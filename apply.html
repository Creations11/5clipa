<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply • 5Clipa</title>

<style>
body{
  font-family:Arial;
  background:#0d1117;
  color:white;
  padding:30px;
}

.container{
  max-width:600px;
  margin:auto;
}

input, select{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  background:#161b22;
  color:white;
}

button{
  width:100%;
  padding:15px;
  margin-top:20px;
  background:#00d084;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#161b22;
  padding:30px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Loan Application</h1>

<form id="loanForm">

<input type="text" placeholder="Full Name" required>

<input type="text" placeholder="South African ID Number" required>

<input type="tel" placeholder="Phone Number" required>

<input type="number" placeholder="Monthly Income" required>

<select required>
<option value="">Employment Status</option>
<option>Employed</option>
<option>Self Employed</option>
<option>Contract Worker</option>
</select>

<button type="submit">
Submit Application
</button>

</form>

</div>

</div>

<script>
document
.getElementById("loanForm")
.addEventListener("submit", function(e){

e.preventDefault();

alert("Application Submitted Successfully");

});
</script>

</body>
</html>
